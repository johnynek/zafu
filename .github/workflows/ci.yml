name: ci

on:
  pull_request: {}

jobs:
  lib-check-test-publish-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install c runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgc1 libgc-dev pkg-config pandoc
      - name: Fetch Bosatsu CLI and runtime
        run: ./bosatsu --fetch
      - name: Run lib check, lib test, and dry-run publish
        run: scripts/test.sh
      - name: Generate docs and convert markdown to HTML
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_REPO="${{ github.repository }}"
          # Use the checked-out merge SHA so generated links always match docs input.
          SOURCE_REF="${{ github.sha }}"
          mkdir -p docs/markdown docs/html
          ./bosatsu lib fetch
          ./bosatsu lib doc \
            --outdir docs/markdown \
            --source_repo_url "https://github.com/${SOURCE_REPO}/blob/${SOURCE_REF}"
          mapfile -t source_urls < <(
            grep -RhoE '\(https://github.com/[^)]*\)' docs/markdown --include='*.md' \
              | tr -d '()' \
              | sort -u
          )
          if [[ "${#source_urls[@]}" -eq 0 ]]; then
            echo "No source URLs were generated in markdown docs." >&2
            exit 1
          fi
          checked_source_urls=0
          for source_url in "${source_urls[@]}"; do
            # Validate links that should resolve in this repository at this exact SHA.
            # Some dependency-owned source links are emitted from external metadata and
            # are outside this repo's control.
            if [[ "$source_url" != "https://github.com/${SOURCE_REPO}/"* ]]; then
              continue
            fi
            checked_source_urls=$((checked_source_urls + 1))
            url_ok=0
            for attempt in 1 2 3; do
              http_code="$(curl -L -s -o /dev/null -w '%{http_code}' "$source_url")"
              if [[ "$http_code" == "200" ]]; then
                url_ok=1
                break
              fi
              if [[ "$http_code" == "429" || "$http_code" =~ ^5 ]]; then
                sleep $((attempt * 2))
                continue
              fi
              break
            done
            if [[ "$url_ok" -ne 1 ]]; then
              echo "Unreachable source URL ($http_code): $source_url" >&2
              exit 1
            fi
          done
          if [[ "$checked_source_urls" -eq 0 ]]; then
            echo "No in-repo source URLs were generated in markdown docs." >&2
            exit 1
          fi
          converted=0
          while IFS= read -r -d '' md_file; do
            converted=1
            rel_path="${md_file#docs/markdown/}"
            html_path="docs/html/${rel_path%.md}.html"
            mkdir -p "$(dirname "$html_path")"
            pandoc "$md_file" \
              --from=gfm \
              --to=html5 \
              --standalone \
              --lua-filter scripts/rewrite_md_links.lua \
              --metadata "title=${rel_path%.md}" \
              --output "$html_path"
          done < <(find docs/markdown -type f -name '*.md' -print0)
          if [[ "$converted" -eq 0 ]]; then
            echo "No markdown docs were generated." >&2
            exit 1
          fi
