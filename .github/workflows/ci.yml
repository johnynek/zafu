name: ci

on:
  pull_request: {}

jobs:
  lib-check-test-publish-dry-run:
    runs-on: ubuntu-latest
    env:
      BOSATSU_PLATFORM_OVERRIDE: java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install c runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgc1 libgc-dev pkg-config pandoc
      - name: Fetch Bosatsu CLI and runtime
        run: ./bosatsu --fetch
      - name: Run check, test, and dry-run publish
        run: scripts/test.sh
      - name: Generate docs and convert markdown to HTML
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_REPO="${{ github.repository }}"
          # Use the checked-out merge SHA so generated links always match docs input.
          SOURCE_REF="${{ github.sha }}"
          mkdir -p docs/markdown docs/html
          ./bosatsu fetch
          ./bosatsu doc \
            --outdir docs/markdown \
            --source_repo_url "https://github.com/${SOURCE_REPO}/blob/${SOURCE_REF}"
          ./scripts/validate_doc_source_urls.sh docs/markdown "$SOURCE_REPO" "$SOURCE_REF"
          converted=0
          while IFS= read -r -d '' md_file; do
            converted=1
            rel_path="${md_file#docs/markdown/}"
            html_path="docs/html/${rel_path%.md}.html"
            mkdir -p "$(dirname "$html_path")"
            pandoc "$md_file" \
              --from=gfm \
              --to=html5 \
              --standalone \
              --lua-filter scripts/rewrite_md_links.lua \
              --metadata "title=${rel_path%.md}" \
              --output "$html_path"
          done < <(find docs/markdown -type f -name '*.md' -print0)
          if [[ "$converted" -eq 0 ]]; then
            echo "No markdown docs were generated." >&2
            exit 1
          fi
