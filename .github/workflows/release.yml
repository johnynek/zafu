name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  verify-tag-on-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify tagged commit is on main
        run: |
          set -euo pipefail
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag $GITHUB_REF_NAME is not on main" >&2
            exit 1
          fi

  release-bosatsu-lib:
    needs: verify-tag-on-main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch Bosatsu CLI and runtime
        run: ./bosatsu --fetch
      - name: Verify library before release
        run: |
          ./bosatsu lib check --repo_root "$GITHUB_WORKSPACE"
          ./bosatsu lib test --repo_root "$GITHUB_WORKSPACE"
      - name: Publish Bosatsu library files for release assets
        env:
          REPO_ROOT: ${{ github.workspace }}
          OUTDIR: ${{ github.workspace }}/.bosatsu_lib_publish
          GIT_SHA: ${{ github.sha }}
          URI_BASE: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/
        run: scripts/publish_bosatsu_libs.sh
      - name: Create GitHub release with .bosatsu_lib assets
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: .bosatsu_lib_publish/*.bosatsu_lib
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
